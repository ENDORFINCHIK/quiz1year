<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<div class="heart">💗 💖 💕 💘</div>

<h1>Love Quiz ❤️</h1>

<div class="quiz-card">

<div class="question">Коли ми познайомились?</div>

<button class="option">20 лютого</button>
<button class="option">19 лютого</button>
<button class="option">22 лютого</button>
<button class="option">23 лютого</button>

<p id="result"></p>


</div>
<a href="quiz1.html">1</a>
<a href="quiz2.html">2</a>
<a href="quiz3.html">3</a>
<a href="quiz4.html">4</a>
<a href="quiz5.html">5</a>
<a href="quiz6.html">6</a>
</div>

<script>

const options = document.querySelectorAll(".option");
const result = document.getElementById("result");

options.forEach((button, index) => {

    button.addEventListener("click", () => {

        options.forEach(btn=>{
            btn.style.backgroundColor="";
        });

        if(index === 0){
            button.style.backgroundColor="green";
            result.textContent="Правильно ❤️ Шукай там, де стоїть Persil";
        } 
        else{
            button.style.backgroundColor="red";
            result.textContent="Неправильно 😢 Шукай там, де стоїть Persil";
        }

    });

});

</script>

</body>
</html>
