<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<div class="heart">💗 💖 💕 💘</div>

<h1>Love Quiz ❤️</h1>

<div class="quiz-card">

<div class="question">Коли ми вперше зустрілись?</div>

<button class="option">16 травня</button>
<button class="option">13 травня</button>
<button class="option">22 травня</button>
<button class="option">23 травня</button>

<p id="result"></p>


</div>

</div>

<script>

const options = document.querySelectorAll(".option");
const result = document.getElementById("result");

options.forEach((button, index) => {

    button.addEventListener("click", () => {

        options.forEach(btn=>{
            btn.style.backgroundColor="";
        });

        if(index === 0){
            button.style.backgroundColor="green";
            result.textContent="Правильно ❤️ Шукай в кімнаті, там де ще немає речей)";
        } 
        else{
            button.style.backgroundColor="red";
            result.textContent="Неправильно 😢";
        }

    });

});

</script>

</body>
</html>
